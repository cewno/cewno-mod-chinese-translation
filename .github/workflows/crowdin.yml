name: Crowdin Action

on:
  workflow_dispatch:
    inputs:
      uploadTranslations:
        description: "Set to true to upload (changed) translations to Crowdin"
        type: boolean
        required: true
        default: false
      download_translations:
        description: "Set to true to download latest translations to i10n branch "
        type: boolean
        required: true
        default: true
      create_pull_request:
        description: "Set to true to create a pull request to synchronize the language files to main"
        type: boolean
        required: true
        default: true

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Crowdin action
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          download_translations: ${{ github.event.inputs.download_translations }}
          upload_translations: ${{ github.event.inputs.uploadTranslations }}
          create_pull_request: ${{ github.event.inputs.create_pull_request }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CROWDIN_PROJECT_ID: ${{ vars.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}