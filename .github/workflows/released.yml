on:
  release:
    types:
      - released
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: pack
        run: zip -r "build_$GITHUB_SHA.zip" src/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
            name: "build_$GITHUB_SHA.zip"
            path: "build_$GITHUB_SHA.zip"